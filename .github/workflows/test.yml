name: Test Cali Finance

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display Python version
        run: python --version

      - name: Compile source
        run: python -m compileall -q cali_finance finance.py

      - name: Run smoke test
        run: python tests/smoke_test.py

      - name: Run migration test
        run: python tests/migration_test.py

      - name: Run restore test
        run: python tests/restore_test.py
